<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识库调试 - 知识库中台</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: #17233d;
      background: #eef4fb;
    }
    .page { min-height: 100vh; padding: 18px; }
    header {
      height: var(--app-header-height);
      display: grid;
      grid-template-columns: 190px 1fr 180px;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .brand { display: flex; align-items: center; text-decoration: none; }
    .brand-logo { width: 158px; height: auto; display: block; }
    .title {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
      color: #113b73;
      letter-spacing: 0;
      text-align: center;
    }
    .user {
      justify-self: end;
      height: 42px;
      min-width: 142px;
      padding: 0 12px;
      border-radius: 8px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: #284263;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(49, 86, 128, .12);
    }
    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4aa6ff, #1f6fd6);
    }
    .chev {
      width: 7px;
      height: 7px;
      border-right: 2px solid #7489a6;
      border-bottom: 2px solid #7489a6;
      transform: rotate(45deg);
      margin-left: auto;
    }
    .workspace {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 16px;
      min-height: calc(100vh - 106px);
    }
    .side {
      background: #fff;
      padding: 18px 12px;
      box-shadow: 0 16px 36px rgba(51, 85, 128, .12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .nav { display: grid; gap: 8px; }
    .nav a,
    .upload {
      height: 44px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #536b8d;
      text-decoration: none;
      font-size: 15px;
      border-radius: 8px;
    }
    .nav a svg,
    .upload svg { width: 19px; height: 19px; flex: 0 0 auto; }
    .nav a.active {
      color: #0069ff;
      background: linear-gradient(90deg, rgba(0, 111, 255, .1), rgba(0, 111, 255, .02));
      box-shadow: inset 3px 0 0 #0b72ff;
    }
    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
    }
    .toolbar {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 12px 28px rgba(51, 85, 128, .1);
    }
    .crumb { color: #7890ad; font-size: 14px; }
    .selectors { display: flex; align-items: center; gap: 10px; }
    .selectors select,
    .selectors input {
      height: 34px;
      border: 1px solid #d7e3f2;
      border-radius: 6px;
      padding: 0 10px;
      color: #24415f;
      background: #f8fbff;
      outline: none;
    }
    .chat-shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 220px minmax(520px, 1fr) 420px;
      gap: 16px;
    }
    .sessions,
    .conversation,
    .sources {
      min-height: 0;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 16px 36px rgba(51, 85, 128, .12);
    }
    .sessions {
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      overflow: hidden;
    }
    .session-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .session-top h2 {
      margin: 0;
      font-size: 16px;
      color: #163b68;
      white-space: nowrap;
    }
    .new-session {
      height: 32px;
      padding: 0 11px;
      border: 0;
      border-radius: 7px;
      color: #fff;
      background: #0b72ff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .session-list {
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 8px;
      padding-right: 2px;
    }
    .session-item {
      width: 100%;
      border: 1px solid #e3edf7;
      border-radius: 8px;
      padding: 10px;
      background: #f9fbfe;
      text-align: left;
      cursor: pointer;
    }
    .session-item.active {
      border-color: rgba(11, 114, 255, .55);
      background: rgba(11, 114, 255, .08);
    }
    .session-title {
      color: #1b3d63;
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-meta {
      margin-top: 6px;
      color: #7a90aa;
      font-size: 12px;
      white-space: nowrap;
    }
    .conversation {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      overflow: hidden;
    }
    .messages {
      min-height: 0;
      overflow: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message-row { display: flex; }
    .message-row.user { justify-content: flex-end; }
    .bubble {
      max-width: min(720px, 76%);
      padding: 13px 15px;
      border-radius: 8px;
      line-height: 1.65;
      font-size: 15px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .assistant .bubble {
      background: #f4f8fc;
      color: #223b5b;
      border: 1px solid #e1ebf6;
    }
    .user .bubble {
      color: #fff;
      background: #176bdb;
    }
    .composer {
      padding: 14px;
      border-top: 1px solid #e4edf7;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px;
      gap: 10px;
    }
    .composer textarea {
      min-height: 48px;
      max-height: 130px;
      resize: vertical;
      border: 1px solid #d9e5f3;
      border-radius: 8px;
      padding: 12px;
      outline: none;
      font: inherit;
      line-height: 1.5;
      color: #1c3656;
      background: #fbfdff;
    }
    .composer button {
      height: 48px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: #0b72ff;
      font-weight: 700;
      cursor: pointer;
    }
    .sources {
      padding: 18px;
      overflow: auto;
    }
    .sources h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #163b68;
    }
    .source-list { display: grid; gap: 12px; }
    .source-item {
      border: 1px solid #e2ebf6;
      border-radius: 8px;
      padding: 13px;
      background: #f9fbfe;
    }
    .source-title {
      font-size: 14px;
      font-weight: 700;
      color: #214464;
      margin-bottom: 8px;
      overflow-wrap: anywhere;
    }
    .source-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
      color: #7890ad;
      font-size: 12px;
      font-weight: 700;
    }
    .source-link {
      color: #0b72ff;
      text-decoration: none;
    }
    .source-link:hover { text-decoration: underline; }
    .source-text {
      max-height: 150px;
      overflow: auto;
      color: #5c718d;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .empty {
      color: #8094ad;
      font-size: 13px;
      line-height: 1.6;
    }
    @media (max-width: 1180px) {
      body { overflow: auto; }
      .page { min-width: 1180px; min-height: 760px; }
    }
    @media (min-width: 1600px) {
      .chat-shell {
        grid-template-columns: 230px minmax(760px, 1fr) 520px;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/app-common.css" />
</head>
<body>
  <main class="page">
    <header>
      <a class="brand" href="knowledge-dashboard.html">
        <img class="brand-logo" src="assets/logo.png" alt="数智云工" />
      </a>
      <h1 class="title"><span>知识库中台</span></h1>
      <a class="user" href="profile.html">
        <span class="avatar"></span>
        <span id="currentUserName">个人中心</span>
        <span class="chev"></span>
      </a>
    </header>

    <section class="workspace">
      <aside class="side">
        <nav class="nav"></nav>
        <a class="upload" href="upload.html"></a>
      </aside>

      <section class="main">
        <div class="toolbar">
          <div class="crumb">知识库中台&nbsp;&nbsp;/&nbsp;&nbsp;知识库调试</div>
          <div class="selectors">
            <select id="categorySelect">
              <option value="__all__">全部分类</option>
              <option value="课程资料">课程资料</option>
              <option value="学习资料">学习资料</option>
              <option value="个人资料">个人资料</option>
            </select>
            <input id="bucketInput" placeholder="向量 Bucket" value="" />
          </div>
        </div>

        <section class="chat-shell">
          <aside class="sessions">
            <div class="session-top">
              <h2>历史记录</h2>
              <button class="new-session" id="newSessionButton" type="button">新增会话</button>
            </div>
            <div class="session-list" id="sessionList"></div>
          </aside>

          <section class="conversation">
            <div class="messages" id="messages">
              <div class="message-row assistant">
                <div class="bubble">你好，我可以基于知识库内容回答问题。你可以问我课程适合对象、方案内容、实施流程等。</div>
              </div>
            </div>
            <form class="composer" id="chatForm">
              <textarea id="messageInput" placeholder="输入问题，按 Enter 发送，Shift + Enter 换行"></textarea>
              <button id="sendButton" type="submit">发送</button>
            </form>
          </section>

          <aside class="sources">
            <h2>引用来源</h2>
            <div class="source-list" id="sourceList">
              <div class="empty">发送问题后，这里会显示召回的知识库片段。</div>
            </div>
          </aside>
        </section>
      </section>
    </section>
  </main>

  <script src="assets/app-common.js"></script>
  <script>
    const messagesNode = document.getElementById("messages");
    const sourceList = document.getElementById("sourceList");
    const form = document.getElementById("chatForm");
	    const input = document.getElementById("messageInput");
	    const sendButton = document.getElementById("sendButton");
	    const bucketInput = document.getElementById("bucketInput");
	    const categorySelect = document.getElementById("categorySelect");
	    const sessionList = document.getElementById("sessionList");
	    const newSessionButton = document.getElementById("newSessionButton");
	    const welcomeText = "你好，我可以基于知识库内容回答问题。你可以问我课程适合对象、方案内容、实施流程等。";
	    let currentUserKey = localStorage.getItem("currentUser") || "guest";
	    let sessions = [];
	    let activeSessionId = "";

	    function storageKey() {
	      return `knowledge-debug-sessions:${currentUserKey || "guest"}`;
	    }

	    function createSession() {
	      const now = new Date().toISOString();
	      return {
	        id: `session_${Date.now()}_${Math.random().toString(16).slice(2)}`,
	        title: "新会话",
	        createdAt: now,
	        updatedAt: now,
	        messages: [],
	        sources: []
	      };
	    }

	    function getActiveSession() {
	      return sessions.find((session) => session.id === activeSessionId) || null;
	    }

	    function saveSessions() {
	      localStorage.setItem(storageKey(), JSON.stringify(sessions.slice(0, 40)));
	    }

	    function loadSessions() {
	      try {
	        const parsed = JSON.parse(localStorage.getItem(storageKey()) || "[]");
	        sessions = Array.isArray(parsed) ? parsed.filter((item) => item && item.id) : [];
	      } catch (error) {
	        sessions = [];
	      }
	      if (!sessions.length) sessions = [createSession()];
	      activeSessionId = sessions[0].id;
	      saveSessions();
	      renderSessionList();
	      renderActiveSession();
	    }

	    function formatSessionTime(value) {
	      const date = new Date(value);
	      if (Number.isNaN(date.getTime())) return "";
	      return `${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
	    }

	    function renderSessionList() {
	      sessionList.innerHTML = "";
	      sessions.forEach((session) => {
	        const button = document.createElement("button");
	        button.type = "button";
	        button.className = `session-item${session.id === activeSessionId ? " active" : ""}`;
	        button.dataset.sessionId = session.id;
	        const title = document.createElement("div");
	        title.className = "session-title";
	        title.textContent = session.title || "新会话";
	        const meta = document.createElement("div");
	        meta.className = "session-meta";
	        meta.textContent = `${(session.messages || []).length} 条消息 · ${formatSessionTime(session.updatedAt)}`;
	        button.append(title, meta);
	        sessionList.appendChild(button);
	      });
	    }

	    function renderActiveSession() {
	      const session = getActiveSession();
	      messagesNode.innerHTML = "";
	      appendMessage("assistant", welcomeText, false);
	      (session?.messages || []).forEach((item) => appendMessage(item.role, item.content, false));
	      renderSources(session?.sources || []);
	      messagesNode.scrollTop = messagesNode.scrollHeight;
	    }

	    function switchSession(sessionId) {
	      if (activeSessionId === sessionId) return;
	      activeSessionId = sessionId;
	      renderSessionList();
	      renderActiveSession();
	    }

	    function startNewSession() {
	      const session = createSession();
	      sessions.unshift(session);
	      activeSessionId = session.id;
	      saveSessions();
	      renderSessionList();
	      renderActiveSession();
	      input.focus();
	    }

    async function applyUserVectorTarget() {
      try {
        const response = await fetch(KnowledgeApp.apiUrl("/api/profile"));
        const data = await response.json();
	        const user = data.user || {};
	        currentUserKey = user.username || localStorage.getItem("currentUser") || "guest";
	        bucketInput.value = user.vector_bucket || "liu-teacher-618-v2";
	        const editable = user.account_type === "admin";
	        bucketInput.readOnly = !editable;
	      } catch (error) {
	        bucketInput.value = "liu-teacher-618-v2";
        bucketInput.readOnly = true;
      }
    }

    async function loadCategories() {
      try {
        const response = await fetch(KnowledgeApp.apiUrl("/api/categories"));
        const data = await response.json();
        const items = data.items || [];
        const categoryOptions = ['<option value="__all__">全部分类</option>'];
        if (items.length) {
          categoryOptions.push(...items.map((item) => `<option value="${item.name}">${item.name}</option>`));
        }
        categorySelect.innerHTML = categoryOptions.join("");
        categorySelect.value = "__all__";
      } catch (error) {
        categorySelect.value = "__all__";
      }
    }

	    function appendMessage(role, content, shouldScroll = true) {
	      const row = document.createElement("div");
	      row.className = `message-row ${role}`;
	      const bubble = document.createElement("div");
	      bubble.className = "bubble";
	      bubble.textContent = content;
	      row.appendChild(bubble);
	      messagesNode.appendChild(row);
	      if (shouldScroll) messagesNode.scrollTop = messagesNode.scrollHeight;
	      return bubble;
	    }

    function renderSources(sources) {
      sourceList.innerHTML = "";
      if (!sources || !sources.length) {
        sourceList.innerHTML = '<div class="empty">本次没有召回到来源片段。</div>';
        return;
      }
      sources.forEach((source, index) => {
        const item = document.createElement("div");
        item.className = "source-item";
        const title = document.createElement("div");
        title.className = "source-title";
        title.textContent = `[${index + 1}] ${source.title || "未命名片段"}`;
        const meta = document.createElement("div");
        meta.className = "source-meta";
        const metaItems = [];
        if (source.category) metaItems.push(`分类：${source.category}`);
        if (source.index) metaItems.push(`索引：${source.index}`);
        if (source.distance !== null && source.distance !== undefined) metaItems.push(`距离：${Number(source.distance).toFixed(4)}`);
        if (source.score !== null && source.score !== undefined) metaItems.push(`分数：${Number(source.score).toFixed(4)}`);
        meta.textContent = metaItems.join("  ");
        const text = document.createElement("div");
        text.className = "source-text";
        text.textContent = source.snippet || source.chunk_text || "该片段缺少正文内容，请检查预处理入库字段。";
        item.append(title);
        if (metaItems.length) item.appendChild(meta);
        item.appendChild(text);
        if (source.source_url) {
          const link = document.createElement("a");
          link.className = "source-link";
          link.href = source.source_url.startsWith("/api/")
            ? KnowledgeApp.apiUrl(source.source_url)
            : source.source_url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = "查看原文件";
          item.appendChild(link);
        }
        sourceList.appendChild(item);
      });
    }

	    async function sendMessage(message) {
	      let session = getActiveSession();
	      if (!session) {
	        session = createSession();
	        sessions.unshift(session);
	        activeSessionId = session.id;
	      }
	      appendMessage("user", message);
	      session.messages.push({ role: "user", content: message });
	      if (!session.title || session.title === "新会话") session.title = message.slice(0, 24);
	      session.updatedAt = new Date().toISOString();
	      saveSessions();
	      renderSessionList();
	      const pending = appendMessage("assistant", "正在检索知识库...");
	      KnowledgeApp.setButtonLoading(sendButton, true, "发送");
	      try {
	        const response = await fetch(KnowledgeApp.apiUrl("/api/chat"), {
	          method: "POST",
	          headers: { "Content-Type": "application/json" },
	          body: JSON.stringify({
	            message,
	            history: session.messages,
	            top_k: 6,
	            bucket: bucketInput.value.trim(),
	            category: categorySelect.value
	          })
	        });
	        const data = await response.json();
	        if (!response.ok) throw new Error(data.error || "知识库调试失败");
	        pending.textContent = data.answer || "没有生成回答。";
	        session.messages.push({ role: "assistant", content: pending.textContent });
	        session.sources = data.sources || [];
	        session.updatedAt = new Date().toISOString();
	        saveSessions();
	        renderSessionList();
	        renderSources(session.sources);
	      } catch (error) {
	        pending.textContent = `调用失败：${error.message}`;
	        session.messages.push({ role: "assistant", content: pending.textContent });
	        session.sources = [];
	        session.updatedAt = new Date().toISOString();
	        saveSessions();
	        renderSessionList();
	        renderSources([]);
	      } finally {
	        KnowledgeApp.setButtonLoading(sendButton, false);
	      }
	    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      input.value = "";
      sendMessage(message);
    });

	    input.addEventListener("keydown", (event) => {
	      if (event.key === "Enter" && !event.shiftKey) {
	        event.preventDefault();
	        form.requestSubmit();
	      }
	    });

	    sessionList.addEventListener("click", (event) => {
	      const item = event.target.closest(".session-item");
	      if (!item) return;
	      switchSession(item.dataset.sessionId);
	    });

	    newSessionButton.addEventListener("click", startNewSession);

	    async function init() {
	      await applyUserVectorTarget();
	      await loadCategories();
	      loadSessions();
	    }

	    init();
	  </script>
</body>
</html>
