<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人中心</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 0%, rgba(45, 117, 255, .12), transparent 30%),
        radial-gradient(circle at 82% 12%, rgba(32, 199, 190, .12), transparent 28%),
        linear-gradient(145deg, #f7fbff, #e2f0ff);
      color: #071a3d;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    .profile-shell,
    .login-shell {
      width: min(92vw, 460px);
      padding: 30px;
      border-radius: 18px;
      border: 1px solid rgba(80, 132, 220, 0.18);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 26px 70px rgba(34, 93, 178, 0.18);
    }
    .profile-shell {
      width: min(92vw, 560px);
    }
    .brand {
      display: flex;
      align-items: center;
      margin-bottom: 26px;
    }
    .brand-logo {
      width: 190px;
      height: 50px;
      object-fit: contain;
      display: block;
    }
    h1 {
      margin: 0;
      color: #092253;
      font-size: 28px;
      font-weight: 950;
    }
    .sub {
      margin: 10px 0 24px;
      color: #617293;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.7;
    }
    form {
      display: grid;
      gap: 14px;
    }
    label {
      display: grid;
      gap: 8px;
      color: #31466e;
      font-size: 13px;
      font-weight: 900;
    }
    input {
      width: 100%;
      height: 44px;
      padding: 0 13px;
      border-radius: 9px;
      border: 1px solid rgba(72, 128, 224, 0.18);
      background: rgba(255, 255, 255, 0.86);
      color: #17325e;
      font-size: 14px;
      font-weight: 800;
      outline: none;
    }
    .login-btn,
    .logout-btn,
    .back-btn {
      height: 44px;
      margin-top: 6px;
      border: 0;
      border-radius: 9px;
      color: #fff;
      background: linear-gradient(145deg, #1378ff, #006dff);
      font-size: 15px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(19, 120, 255, 0.22);
    }
    .logout-btn {
      width: 100%;
      margin-top: 18px;
      background: linear-gradient(145deg, #ff5f5f, #e83d3d);
      box-shadow: 0 12px 26px rgba(232, 61, 61, 0.18);
    }
    .back-btn {
      width: 100%;
      height: 52px;
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: linear-gradient(145deg, #1378ff, #006dff);
      text-decoration: none;
      font-size: 16px;
      letter-spacing: 0;
      box-shadow: 0 14px 30px rgba(19, 120, 255, 0.22);
    }
    .back-btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }
    .hint {
      color: #607293;
      font-size: 12px;
      font-weight: 750;
      line-height: 1.5;
    }
    .hidden { display: none; }
    .message {
      min-height: 18px;
      color: #e04444;
      font-size: 13px;
      font-weight: 850;
    }
    .message.success { color: #0aa97b; }
    .meta {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      color: #40577d;
      background: rgba(239, 246, 255, 0.78);
      border: 1px solid rgba(72, 128, 224, 0.12);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.7;
    }
    .profile-card {
      display: grid;
      gap: 16px;
      margin-top: 22px;
    }
    .profile-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
    }
    .profile-head h1 {
      margin-top: 0;
    }
    .profile-head .sub {
      margin-bottom: 0;
    }
    .profile-head .logout-btn {
      width: auto;
      min-width: 118px;
      margin-top: 0;
      padding: 0 18px;
      flex: 0 0 auto;
    }
    .info-row {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(239, 246, 255, 0.78);
      border: 1px solid rgba(72, 128, 224, 0.12);
    }
    .info-label {
      color: #607293;
      font-size: 13px;
      font-weight: 900;
    }
    .info-value {
      min-width: 0;
      color: #092253;
      font-size: 15px;
      font-weight: 950;
      overflow-wrap: anywhere;
    }
    .profile-loading {
      margin-top: 20px;
      color: #607293;
      font-size: 14px;
      font-weight: 850;
    }
    .admin-panel {
      margin-top: 22px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(246, 250, 255, 0.86);
      border: 1px solid rgba(72, 128, 224, 0.14);
    }
    .admin-panel h2 {
      margin: 0 0 8px;
      color: #092253;
      font-size: 20px;
      font-weight: 950;
    }
    .admin-panel .sub {
      margin-bottom: 16px;
    }
    .create-user-btn {
      height: 44px;
      border: 0;
      border-radius: 9px;
      color: #fff;
      background: linear-gradient(145deg, #1378ff, #006dff);
      font-size: 15px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(19, 120, 255, 0.22);
    }
  </style>
  <link rel="stylesheet" href="assets/app-common.css" />
</head>
<body>
  <main class="profile-shell hidden" id="profileView">
    <div class="brand">
      <img class="brand-logo" src="assets/logo.png" alt="数智云工" />
    </div>
    <div class="profile-head">
      <div>
        <h1>个人信息</h1>
        <p class="sub">当前登录账号信息如下。退出登录后会返回登录管理页面。</p>
      </div>
      <button class="logout-btn" id="logoutButton" type="button">退出登录</button>
    </div>
    <div class="profile-card">
      <div class="info-row">
        <span class="info-label">用户名</span>
        <span class="info-value" id="profileName">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">账号类型</span>
        <span class="info-value" id="profileType">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">权限范围</span>
        <span class="info-value" id="profileScope">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">向量 Bucket</span>
        <span class="info-value" id="profileBucket">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">最近登录</span>
        <span class="info-value" id="profileLastLogin">-</span>
      </div>
    </div>
    <section class="admin-panel hidden" id="adminPanel">
      <h2>账号分配</h2>
      <p class="sub">仅管理员可以创建普通用户账号。用户名需为中文，密码需为英文和数字组合，至少 8 个字符。</p>
      <form id="createUserForm">
        <label>
          新用户姓名
          <input id="newAccount" autocomplete="off" placeholder="请输入中文用户名" />
        </label>
        <label>
          初始密码
          <input id="newPassword" autocomplete="new-password" type="password" placeholder="请输入英文+数字密码" />
        </label>
        <div class="message" id="createUserMessage"></div>
        <button class="create-user-btn" id="createUserButton" type="submit">创建账号</button>
      </form>
    </section>
    <a class="back-btn" href="overview.html">进入首页</a>
  </main>

  <main class="login-shell hidden" id="loginView">
    <div class="brand">
      <img class="brand-logo" src="assets/logo.png" alt="数智云工" />
    </div>
    <h1>登录管理</h1>
    <p class="sub">请输入账号密码进入知识库中台。管理员可查看全部内容，普通用户仅查看自己上传的文件。</p>
    <form id="loginForm">
      <label>
        用户名
        <input id="account" autocomplete="username" placeholder="请输入用户名" />
      </label>
      <label>
        密码
        <input id="password" autocomplete="current-password" type="password" placeholder="请输入密码" />
      </label>
      <div class="message" id="message"></div>
      <button class="login-btn" type="submit">登录</button>
    </form>
    <div class="meta">当前仅支持管理员分配账号。管理员账号：admin。</div>
  </main>

  <script src="assets/app-common.js"></script>
  <script>
    localStorage.removeItem("adminToken");
    const profileView = document.getElementById("profileView");
    const loginView = document.getElementById("loginView");
    const form = document.getElementById("loginForm");
    const accountInput = document.getElementById("account");
    const passwordInput = document.getElementById("password");
    const submitButton = document.querySelector(".login-btn");
    const message = document.getElementById("message");
    const logoutButton = document.getElementById("logoutButton");
    const adminPanel = document.getElementById("adminPanel");
    const createUserForm = document.getElementById("createUserForm");
    const newAccountInput = document.getElementById("newAccount");
    const newPasswordInput = document.getElementById("newPassword");
    const createUserMessage = document.getElementById("createUserMessage");
    const createUserButton = document.getElementById("createUserButton");

    function clearLoginState() {
      localStorage.removeItem("currentUser");
      localStorage.removeItem("sessionToken");
      localStorage.removeItem("adminToken");
    }

    function showLoginView() {
      profileView.classList.add("hidden");
      loginView.classList.remove("hidden");
    }

    function showProfileView(user) {
      loginView.classList.add("hidden");
      profileView.classList.remove("hidden");
      document.getElementById("profileName").textContent = user.name || user.login_account || "-";
      document.getElementById("profileType").textContent = user.account_type === "admin" ? "管理员" : "普通用户";
      document.getElementById("profileScope").textContent = user.permission_scope || (user.account_type === "admin" ? "全部知识库" : "仅本人上传");
      document.getElementById("profileBucket").textContent = user.vector_bucket || "-";
      document.getElementById("profileLastLogin").textContent = user.last_login || "-";
      adminPanel.classList.toggle("hidden", user.account_type !== "admin");
    }

    async function loadProfile() {
      const currentUser = localStorage.getItem("currentUser") || "";
      const token = localStorage.getItem("sessionToken") || "";
      if (!currentUser || !token) {
        showLoginView();
        return;
      }
      try {
        const response = await fetch(KnowledgeApp.apiUrl("/api/profile"));
        const data = await response.json();
        if (!response.ok || !data.user) {
          clearLoginState();
          showLoginView();
          return;
        }
        localStorage.setItem("currentUser", data.user.name);
        showProfileView(data.user);
      } catch (error) {
        console.warn("Profile unavailable", error);
        showLoginView();
      }
    }

    function validChineseUsername(value) {
      return /^[\u4e00-\u9fff]{2,20}$/.test(value);
    }

    function validPassword(value) {
      return /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/.test(value);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.className = "message";
      message.textContent = "";
      const account = accountInput.value.trim();
      const password = passwordInput.value;
      try {
        KnowledgeApp.setButtonLoading(submitButton, true, "登录中");
        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            account,
            password
          })
        });
        const data = await response.json();
        if (!response.ok) {
          message.textContent = data.error || "登录失败";
          return;
        }
		        localStorage.setItem("currentUser", data.user.name);
		        localStorage.setItem("sessionToken", data.user.sessionToken);
		        message.className = "message success";
		        message.textContent = "登录成功";
		        showProfileView(data.user);
      } catch (error) {
        message.textContent = "登录接口暂时不可用";
        console.warn("Login failed", error);
      } finally {
        KnowledgeApp.setButtonLoading(submitButton, false);
      }
	    });

    logoutButton.addEventListener("click", () => {
      clearLoginState();
      accountInput.value = "";
      passwordInput.value = "";
      adminPanel.classList.add("hidden");
      message.className = "message success";
      message.textContent = "已退出登录";
      showLoginView();
    });

    createUserForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      createUserMessage.className = "message";
      createUserMessage.textContent = "";
      const account = newAccountInput.value.trim();
      const password = newPasswordInput.value;
      if (!validChineseUsername(account)) {
        createUserMessage.textContent = "用户名必须为 2-20 个中文字符";
        return;
      }
      if (!validPassword(password)) {
        createUserMessage.textContent = "密码必须为英文+数字组合，且至少 8 个字符";
        return;
      }
      try {
        KnowledgeApp.setButtonLoading(createUserButton, true, "创建中");
        const response = await fetch(KnowledgeApp.apiUrl("/api/users"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account, password })
        });
        const data = await response.json();
        if (!response.ok) {
          createUserMessage.textContent = data.error || "创建账号失败";
          return;
        }
        createUserMessage.className = "message success";
        createUserMessage.textContent = `账号 ${data.user.name} 创建成功`;
        newAccountInput.value = "";
        newPasswordInput.value = "";
      } catch (error) {
        createUserMessage.textContent = "账号创建接口暂时不可用";
        console.warn("Create user failed", error);
      } finally {
        KnowledgeApp.setButtonLoading(createUserButton, false);
      }
    });

    loadProfile();
	  </script>
</body>
</html>
